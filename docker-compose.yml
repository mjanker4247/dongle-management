services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dongle
      POSTGRES_PASSWORD: dongle
      POSTGRES_DB: dongle_manager
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dongle -d dongle_manager"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://dongle:dongle@db:5432/dongle_manager
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000
      SEED_ON_STARTUP: "true"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
